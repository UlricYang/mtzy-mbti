services:
  # Web服务 - 提供HTTP API
  web:
    image: mtzy-mbti:latest
    container_name: mtzy-mbti-web
    ports:
      - "3000:3000"
    volumes:
      # 挂载主机目录 - 用户可直接访问输入输出文件
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      # Filepath Resolver配置（从.env读取，有默认值）
      - FILEPATH_API_URL=${FILEPATH_API_URL:-http://localhost:8080/api/filepath}
      - API_TOKEN=${API_TOKEN:-}

  # CLI服务 - 用于一次性导出任务
  cli:
    image: mtzy-mbti:latest
    container_name: mtzy-mbti-cli
    volumes:
      # 挂载主机目录 - 与web服务共享数据
      - ./data:/app/data
    # 默认显示帮助信息，实际使用时覆盖command
    command: ["--help"]
    environment:
      - NODE_ENV=production
      # CLI继承filepath resolver配置
      - FILEPATH_API_URL=${FILEPATH_API_URL:-http://localhost:8080/api/filepath}
      - API_TOKEN=${API_TOKEN:-}
    # CLI容器运行后自动退出
    restart: "no"

# 挂载说明:
# ./data/input  - 放入JSON输入文件
# ./data/output - 生成的PDF/PNG文件
# ./data/logs    - 应用日志